# DataWise AI Streamlit runtime config
# Tuned for stable local demos: large uploads, fast reruns, no file watcher
# noise from the inotify polling that has been flaky on Windows.

[server]
# headless 设为 true：云端部署必须（否则会触发交互式邮箱提示卡住启动）。
# 本地启动不会自动弹浏览器，手动访问 localhost:8501 即可。
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 200
maxMessageSize = 200
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
magicEnabled = true

[client]
showErrorDetails = "stacktrace"
toolbarMode = "minimal"

# [theme] 只提供与浅色主题一致的"首帧底色"：没有它，页面刷新时会先渲染
# Streamlit 原生红白默认主题，等脚本跑完注入 CSS 才切换成定制外观——在
# Streamlit Cloud 上这个间隙长达一两秒，看起来像"闪出旧版 UI"。深色模式
# 仍由 ui/theme.py 的运行时 CSS 接管（:root 变量带 !important，可以压过
# 这里的浅色基色），所以只放浅色基础色板、不放深色。
[theme]
base = "light"
primaryColor = "#5654E5"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F7F8"
textColor = "#1F2128"
