# DataWise AI Streamlit runtime config
# Tuned for stable local demos: large uploads, fast reruns, no file watcher
# noise from the inotify polling that has been flaky on Windows.

[server]
# headless 设为 true：云端部署必须（否则会触发交互式邮箱提示卡住启动）。
# 本地启动不会自动弹浏览器，手动访问 localhost:8501 即可。
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 200
maxMessageSize = 200
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
magicEnabled = true

[client]
showErrorDetails = "stacktrace"
toolbarMode = "minimal"

# NOTE: NO [theme] block. When Streamlit's config.toml has a [theme] section
# it injects its own CSS variables (--background-color, --text-color, ...)
# with very high specificity, fighting our runtime dark/light/blue toggle
# in ui/theme.py. Leaving this empty lets our injected CSS fully own the
# look-and-feel so dark mode actually goes dark everywhere.
